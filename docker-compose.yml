version: '3.8'

services:
  antigravity2api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity2api
    restart: unless-stopped
    ports:
      - "8045:8045"
    volumes:
      # 挂载配置文件，方便修改
      - ./config.json:/app/config.json
      # 挂载账户数据，持久化存储
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
